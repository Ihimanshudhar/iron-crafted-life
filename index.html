<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Page - Premium Dark Theme</title>
    <style>
        html { scroll-behavior: smooth; }
        body {
            margin: 0; padding: 0;
            font-family: "Inter", Arial, sans-serif;
            background: #0f0f0f; color: #e6e6e6;
            position: relative;
        }

        /* MODALS */
        .modal-overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            display: none; justify-content: center; align-items: center;
            z-index: 2000; padding: 20px; box-sizing: border-box;
        }
        .modal-window {
            background: #161616; width: 100%; max-width: 650px;
            max-height: 85vh; border-radius: 20px;
            position: relative; overflow-y: auto; border: 1px solid #333;
            animation: modalFadeIn 0.3s ease-out; display: flex; flex-direction: column;
        }
        @keyframes modalFadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .modal-header { padding: 20px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: #161616; z-index: 10; }
        .close-modal { background: none; border: none; color: #888; font-size: 28px; cursor: pointer; }
        .modal-body { padding: 30px; }
        .modal-footer { padding: 20px; text-align: center; border-top: 1px solid #222; }
        .understand-btn { background: #2b7cff; color: white; border: none; padding: 12px 40px; border-radius: 8px; font-weight: 600; cursor: pointer; }

        /* FLOATING READ THIS BUTTON */
        .read-this-toggle {
            position: absolute; top: 20px; right: 20px; z-index: 1000;
            background: #2b7cff; color: white; border: none;
            padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: 0.3s;
        }
        @media (min-width: 769px) { .read-this-toggle { position: fixed; } }

        /* HERO & SEARCH */
        .hero { background: linear-gradient(135deg, #1a1a1a, #111); padding: 100px 20px; text-align: center; }
        .hero h1 { font-size: 3rem; margin: 0; }
        .search-container { margin: 30px auto; max-width: 500px; padding: 0 20px; }
        #productSearch {
            width: 100%; padding: 15px 25px; border-radius: 30px;
            border: 1px solid #333; background: #161616; color: white;
            font-size: 1rem; outline: none; transition: 0.3s; border: 2px solid transparent;
        }
        #productSearch:focus { border-color: #2b7cff; background: #1d1d1d; }

        /* TABS NAVIGATION */
        .tabs-container { 
            background: rgba(20, 20, 20, 0.95); backdrop-filter: blur(10px);
            border-bottom: 1px solid #222; width: 100%; position: sticky; top: 0; z-index: 100;
        }
        .tabs { display: flex; gap: 12px; padding: 15px; overflow-x: auto; scrollbar-width: none; justify-content: center; }
        .tab { background: #1d1d1d; color: #ccc; border: none; padding: 10px 22px; border-radius: 25px; cursor: pointer; white-space: nowrap; transition: 0.3s; }
        .tab.active { background: #2b7cff; color: #fff; }

        /* PRODUCT SECTIONS */
        .product-section { display: none; padding: 40px 20px; justify-content: center; flex-wrap: wrap; gap: 25px; }
        .product-section.active { display: flex; }
        
        /* SEARCH RESULTS VIEW */
        #search-results-section { display: none; padding: 40px 20px; justify-content: center; flex-wrap: wrap; gap: 25px; }
        .search-mode #search-results-section { display: flex; }
        .search-mode .tabs-container, .search-mode .product-section { display: none !important; }

        /* PRODUCT CARDS */
        .product-card { 
            background: #161616; width: 280px; border-radius: 18px; 
            overflow: hidden; border: 1px solid #222; position: relative; transition: 0.3s;
        }
        .product-card:hover { transform: translateY(-8px); border-color: #333; }
        .product-card img { width: 100%; height: 200px; object-fit: cover; }
        .info-icon {
            position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.6); 
            color: white; width: 30px; height: 30px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .product-info { padding: 20px; text-align: center; }
        .product-info h3 { margin: 0 0 15px; font-size: 1.1rem; }
        .product-info a { display: block; padding: 10px; background: #2b7cff; border-radius: 8px; color: white; text-decoration: none; font-weight: 600; }

        #noResults { display: none; text-align: center; width: 100%; padding: 40px; color: #666; font-size: 1.2rem; }

        footer { background: #111; padding: 40px; text-align: center; border-top: 1px solid #222; margin-top: 50px; }
        .info-label { color: #2b7cff; font-weight: 600; margin-top: 15px; display: block; }
        .info-text { margin: 4px 0 10px 0; line-height: 1.5; color: #ccc; }
    </style>
</head>
<body id="pageBody">

    <div class="modal-overlay" id="infoModal">
        <div class="modal-window">
            <div class="modal-header"><h2>Important Information</h2><button class="close-modal" onclick="hideModal('infoModal')">&times;</button></div>
            <div class="modal-body"><p>I use these products and provide affiliate links. Only buy what you truly need.</p></div>
            <div class="modal-footer"><button class="understand-btn" onclick="hideModal('infoModal')">I Understand</button></div>
        </div>
    </div>
    <div class="modal-overlay" id="productDetailModal">
        <div class="modal-window">
            <div class="modal-header"><h2 id="detailTitle">Product Info</h2><button class="close-modal" onclick="hideModal('productDetailModal')">&times;</button></div>
            <div class="modal-body" id="detailBody"></div>
            <div class="modal-footer"><button class="understand-btn" onclick="hideModal('productDetailModal')">Close</button></div>
        </div>
    </div>

    <button class="read-this-toggle" onclick="showModal('infoModal')">Read This</button>

    <div id="main-content">
        <section class="hero">
            <h1>My Essentials</h1>
            <div class="search-container">
                <input type="text" id="productSearch" placeholder="Search across all categories..." oninput="handleGlobalSearch()">
            </div>
        </section>

        <div class="tabs-container">
            <div class="tabs">
                <button class="tab active" data-cat="supplements">Supplements</button>
                <button class="tab" data-cat="accessories">Accessories</button>
                <button class="tab" data-cat="fitness">Fitness</button>
                <button class="tab" data-cat="clothing">Clothing</button>
            </div>
        </div>

        <div id="search-results-section"></div>
        <div id="noResults">Mmmh, daddy can't find that. Try something else.</div>

        <div id="supplements" class="product-section active"></div>
        <div id="accessories" class="product-section"></div>
        <div id="fitness" class="product-section"></div>
        <div id="clothing" class="product-section"></div>
    </div>

    <footer><p>&copy; 2026. Curated for the best.</p></footer>

    <script src="product.js"></script>
    <script>
        const showModal = (id) => document.getElementById(id).style.display = 'flex';
        const hideModal = (id) => document.getElementById(id).style.display = 'none';
        window.onload = () => showModal('infoModal');

        function createCard(p) {
            const card = document.createElement("div");
            card.className = "product-card";
            card.innerHTML = `
                <div class="info-icon" onclick="openProductInfo('${p.name}')">i</div>
                <img src="${p.img}" alt="${p.name}">
                <div class="product-info">
                    <h3>${p.name}</h3>
                    <a href="${p.buy}" target="_blank">Buy Now</a>
                </div>
            `;
            return card;
        }

        // Load Initial Sections
        if (typeof productData !== 'undefined') {
            productData.forEach(p => {
                const container = document.getElementById(p.category);
                if (container) container.appendChild(createCard(p));
            });
        }

        // THE "DADDY" SEARCH LOGIC
        function handleGlobalSearch() {
            const query = document.getElementById('productSearch').value.toLowerCase().trim();
            const body = document.getElementById('pageBody');
            const resultsContainer = document.getElementById('search-results-section');
            const noResults = document.getElementById('noResults');
            
            if (query.length > 0) {
                body.classList.add('search-mode');
                resultsContainer.innerHTML = ''; 
                
                const matches = productData.filter(p => 
                    p.name.toLowerCase().includes(query) || 
                    p.category.toLowerCase().includes(query)
                );

                if (matches.length > 0) {
                    noResults.style.display = 'none';
                    matches.forEach(m => resultsContainer.appendChild(createCard(m)));
                } else {
                    noResults.style.display = 'block';
                }
            } else {
                body.classList.remove('search-mode');
                noResults.style.display = 'none';
            }
        }

        function openProductInfo(name) {
            const p = productData.find(x => x.name === name);
            if(p) {
                document.getElementById('detailTitle').innerText = p.name;
                document.getElementById('detailBody').innerHTML = `
                    <span class="info-label">What:</span><p class="info-text">${p.what}</p>
                    <span class="info-label">Benefits:</span><p class="info-text">${p.benefits}</p>
                    <span class="info-label">Dosage:</span><p class="info-text">${p.dosage}</p>
                    <span class="info-label">When:</span><p class="info-text">${p.when}</p>
                `;
                showModal('productDetailModal');
            }
        }

        // Tab Switching logic
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener("click", () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove("active"));
                document.querySelectorAll('.product-section').forEach(s => s.classList.remove("active"));
                tab.classList.add("active");
                document.getElementById(tab.getAttribute("data-cat")).classList.add("active");
                window.scrollTo(0, document.querySelector('.tabs-container').offsetTop);
            });
        });
    </script>
</body>
</html>
